<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vårdkliniken Norden — Din hälsa i fokus</title>

    <!-- Klar writes this file to the repo; it sets window.__KLAR_PROJECT_ID__. -->
    <script src="/kar-project.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&amp;family=Inter:wght@400;500;600&amp;display=swap"
      rel="stylesheet" />

    <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin=""></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin=""></script>
    <script src="https://unpkg.com/history@4.10.1/umd/history.min.js" crossorigin=""></script>
    <script src="https://unpkg.com/react-router@5.3.4/umd/react-router.min.js" crossorigin=""></script>
    <script src="https://unpkg.com/react-router-dom@5.3.4/umd/react-router-dom.min.js" crossorigin=""></script>
    <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js" crossorigin=""></script>

    <style>
      :root {
        --vkn-bg: #f7f5f0;
        --vkn-surface: #ffffff;
        --vkn-ink: #1f2a2e;
        --vkn-muted: #5c6b6e;
        --vkn-primary: #2f6b5e;
        --vkn-primary-dark: #244f46;
        --vkn-accent: #d6a756;
        --vkn-border: #e4e0d6;
        --vkn-soft: #eef3f0;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Inter", system-ui, sans-serif;
        background: var(--vkn-bg);
        color: var(--vkn-ink);
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
      }

      #vkn-root {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .vkn-app {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      /* HEADER */
      .vkn-header {
        position: sticky;
        top: 0;
        z-index: 50;
        background: rgba(247, 245, 240, 0.9);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid var(--vkn-border);
      }

      .vkn-header__inner {
        max-width: 1140px;
        margin: 0 auto;
        padding: 18px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
      }

      .vkn-logo {
        display: flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
        color: var(--vkn-ink);
      }

      .vkn-logo__mark {
        width: 40px;
        height: 40px;
        border-radius: 12px;
        background: var(--vkn-primary);
        display: grid;
        place-items: center;
        color: #fff;
        font-family: "Fraunces", serif;
        font-size: 22px;
        font-weight: 600;
      }

      .vkn-logo__text {
        font-family: "Fraunces", serif;
        font-size: 20px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }

      .vkn-logo__text span {
        display: block;
        font-family: "Inter", sans-serif;
        font-size: 11px;
        font-weight: 500;
        color: var(--vkn-muted);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .vkn-nav {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .vkn-nav__link {
        text-decoration: none;
        color: var(--vkn-muted);
        font-weight: 500;
        font-size: 15px;
        padding: 8px 14px;
        border-radius: 8px;
        transition: all 0.18s;
      }

      .vkn-nav__link:hover {
        color: var(--vkn-ink);
        background: var(--vkn-soft);
      }

      .vkn-nav__link.vkn-active {
        color: var(--vkn-primary);
        background: var(--vkn-soft);
      }

      .vkn-nav__cta {
        background: var(--vkn-primary);
        color: #fff !important;
        padding: 10px 18px;
        border-radius: 999px;
        font-weight: 600;
      }

      .vkn-nav__cta:hover {
        background: var(--vkn-primary-dark);
      }

      .vkn-burger {
        display: none;
        background: none;
        border: none;
        cursor: pointer;
        padding: 8px;
      }

      .vkn-burger span {
        display: block;
        width: 22px;
        height: 2px;
        background: var(--vkn-ink);
        margin: 4px 0;
        border-radius: 2px;
        transition: 0.2s;
      }

      /* MAIN */
      .vkn-main {
        flex: 1;
      }

      .vkn-container {
        max-width: 1140px;
        margin: 0 auto;
        padding: 0 24px;
      }

      /* HERO */
      .vkn-hero {
        display: grid;
        grid-template-columns: 1.05fr 0.95fr;
        gap: 48px;
        align-items: center;
        padding: 72px 0 64px;
      }

      .vkn-hero__eyebrow {
        display: inline-block;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--vkn-primary);
        margin-bottom: 16px;
      }

      .vkn-hero h1 {
        font-family: "Fraunces", serif;
        font-size: clamp(2.4rem, 5vw, 3.6rem);
        line-height: 1.08;
        font-weight: 600;
        letter-spacing: -0.02em;
        margin-bottom: 20px;
      }

      .vkn-hero p {
        font-size: 18px;
        color: var(--vkn-muted);
        max-width: 460px;
        margin-bottom: 28px;
      }

      .vkn-hero__actions {
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
      }

      .vkn-hero__img {
        border-radius: 24px;
        overflow: hidden;
        box-shadow: 0 30px 60px -28px rgba(31, 42, 46, 0.4);
        aspect-ratio: 4/5;
      }

      .vkn-hero__img img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .vkn-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        text-decoration: none;
        font-weight: 600;
        font-size: 15px;
        padding: 13px 24px;
        border-radius: 999px;
        border: 1px solid transparent;
        transition: all 0.18s;
      }

      .vkn-btn--primary {
        background: var(--vkn-primary);
        color: #fff;
      }

      .vkn-btn--primary:hover {
        background: var(--vkn-primary-dark);
        transform: translateY(-1px);
      }

      .vkn-btn--ghost {
        background: transparent;
        color: var(--vkn-ink);
        border-color: var(--vkn-border);
      }

      .vkn-btn--ghost:hover {
        background: var(--vkn-surface);
        border-color: var(--vkn-primary);
      }

      /* FEATURE STRIP */
      .vkn-strip {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 24px;
        padding: 8px 0 72px;
      }

      .vkn-strip__card {
        background: var(--vkn-surface);
        border: 1px solid var(--vkn-border);
        border-radius: 18px;
        padding: 26px;
      }

      .vkn-strip__icon {
        font-size: 26px;
        margin-bottom: 12px;
      }

      .vkn-strip__card h3 {
        font-family: "Fraunces", serif;
        font-size: 19px;
        margin-bottom: 8px;
      }

      .vkn-strip__card p {
        color: var(--vkn-muted);
        font-size: 15px;
      }

      /* SECTION HEADERS */
      .vkn-section {
        padding: 64px 0;
      }

      .vkn-section--soft {
        background: var(--vkn-soft);
      }

      .vkn-section__head {
        max-width: 640px;
        margin-bottom: 40px;
      }

      .vkn-section__eyebrow {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--vkn-primary);
        margin-bottom: 12px;
        display: block;
      }

      .vkn-section__head h2 {
        font-family: "Fraunces", serif;
        font-size: clamp(1.9rem, 3.5vw, 2.6rem);
        line-height: 1.12;
        font-weight: 600;
        letter-spacing: -0.015em;
        margin-bottom: 14px;
      }

      .vkn-section__head p {
        color: var(--vkn-muted);
        font-size: 17px;
      }

      /* TREATMENTS GRID */
      .vkn-treatments {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 24px;
      }

      .vkn-treat-card {
        background: var(--vkn-surface);
        border: 1px solid var(--vkn-border);
        border-radius: 20px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }

      .vkn-treat-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 24px 48px -28px rgba(31, 42, 46, 0.32);
      }

      .vkn-treat-card__img {
        aspect-ratio: 16/10;
        overflow: hidden;
      }

      .vkn-treat-card__img img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .vkn-treat-card__body {
        padding: 22px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        flex: 1;
      }

      .vkn-treat-card__body h3 {
        font-family: "Fraunces", serif;
        font-size: 20px;
      }

      .vkn-treat-card__body p {
        color: var(--vkn-muted);
        font-size: 15px;
        flex: 1;
      }

      .vkn-treat-card__meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 6px;
        padding-top: 14px;
        border-top: 1px solid var(--vkn-border);
      }

      .vkn-treat-card__price {
        font-weight: 600;
        color: var(--vkn-primary);
      }

      .vkn-treat-card__time {
        font-size: 13px;
        color: var(--vkn-muted);
      }

      /* ABOUT */
      .vkn-about-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 48px;
        align-items: center;
      }

      .vkn-about-grid img {
        width: 100%;
        border-radius: 22px;
        object-fit: cover;
        aspect-ratio: 5/4;
      }

      .vkn-about-grid h2 {
        font-family: "Fraunces", serif;
        font-size: clamp(1.9rem, 3.5vw, 2.5rem);
        margin-bottom: 16px;
        letter-spacing: -0.015em;
      }

      .vkn-about-grid p {
        color: var(--vkn-muted);
        font-size: 17px;
        margin-bottom: 16px;
      }

      .vkn-stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        margin-top: 48px;
      }

      .vkn-stat {
        text-align: center;
        padding: 24px;
        background: var(--vkn-surface);
        border: 1px solid var(--vkn-border);
        border-radius: 18px;
      }

      .vkn-stat__num {
        font-family: "Fraunces", serif;
        font-size: 34px;
        color: var(--vkn-primary);
        font-weight: 600;
      }

      .vkn-stat__label {
        font-size: 14px;
        color: var(--vkn-muted);
      }

      .vkn-team {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 24px;
        margin-top: 16px;
      }

      .vkn-member {
        background: var(--vkn-surface);
        border: 1px solid var(--vkn-border);
        border-radius: 20px;
        overflow: hidden;
      }

      .vkn-member img {
        width: 100%;
        aspect-ratio: 1;
        object-fit: cover;
        display: block;
      }

      .vkn-member__body {
        padding: 20px;
      }

      .vkn-member__body h4 {
        font-family: "Fraunces", serif;
        font-size: 18px;
      }

      .vkn-member__body span {
        font-size: 14px;
        color: var(--vkn-primary);
        font-weight: 500;
      }

      .vkn-member__body p {
        font-size: 14px;
        color: var(--vkn-muted);
        margin-top: 8px;
      }

      /* CONTACT */
      .vkn-contact-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 48px;
      }

      .vkn-info-card {
        display: flex;
        gap: 16px;
        padding: 22px;
        background: var(--vkn-surface);
        border: 1px solid var(--vkn-border);
        border-radius: 16px;
        margin-bottom: 16px;
      }

      .vkn-info-card__icon {
        font-size: 22px;
      }

      .vkn-info-card h4 {
        font-size: 16px;
        margin-bottom: 4px;
      }

      .vkn-info-card p {
        color: var(--vkn-muted);
        font-size: 15px;
      }

      .vkn-form {
        background: var(--vkn-surface);
        border: 1px solid var(--vkn-border);
        border-radius: 22px;
        padding: 32px;
      }

      .vkn-field {
        margin-bottom: 18px;
      }

      .vkn-field label {
        display: block;
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 6px;
      }

      .vkn-field input,
      .vkn-field textarea,
      .vkn-field select {
        width: 100%;
        padding: 12px 14px;
        border: 1px solid var(--vkn-border);
        border-radius: 10px;
        font: inherit;
        background: var(--vkn-bg);
        color: var(--vkn-ink);
      }

      .vkn-field input:focus,
      .vkn-field textarea:focus,
      .vkn-field select:focus {
        outline: none;
        border-color: var(--vkn-primary);
        background: #fff;
      }

      .vkn-form__msg {
        margin-top: 16px;
        padding: 14px;
        border-radius: 10px;
        background: var(--vkn-soft);
        color: var(--vkn-primary);
        font-weight: 500;
        font-size: 15px;
      }

      /* CTA BANNER */
      .vkn-cta-banner {
        background: var(--vkn-primary);
        color: #fff;
        border-radius: 26px;
        padding: 56px;
        text-align: center;
        margin: 32px 0;
      }

      .vkn-cta-banner h2 {
        font-family: "Fraunces", serif;
        font-size: clamp(1.8rem, 3.5vw, 2.4rem);
        margin-bottom: 14px;
      }

      .vkn-cta-banner p {
        color: rgba(255, 255, 255, 0.85);
        font-size: 17px;
        max-width: 480px;
        margin: 0 auto 26px;
      }

      .vkn-cta-banner .vkn-btn--primary {
        background: #fff;
        color: var(--vkn-primary);
      }

      .vkn-cta-banner .vkn-btn--primary:hover {
        background: var(--vkn-bg);
      }

      /* PAGE HEADER */
      .vkn-page-head {
        background: var(--vkn-soft);
        padding: 56px 0;
        border-bottom: 1px solid var(--vkn-border);
      }

      .vkn-page-head h1 {
        font-family: "Fraunces", serif;
        font-size: clamp(2rem, 4vw, 3rem);
        letter-spacing: -0.02em;
      }

      .vkn-page-head p {
        color: var(--vkn-muted);
        font-size: 18px;
        margin-top: 10px;
        max-width: 560px;
      }

      /* FOOTER */
      .vkn-footer {
        background: var(--vkn-ink);
        color: #cdd6d4;
        padding: 56px 0 28px;
        margin-top: auto;
      }

      .vkn-footer__grid {
        display: grid;
        grid-template-columns: 1.5fr 1fr 1fr;
        gap: 40px;
        padding-bottom: 36px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      .vkn-footer__grid h4 {
        color: #fff;
        font-size: 15px;
        margin-bottom: 14px;
      }

      .vkn-footer__grid p {
        font-size: 14px;
        line-height: 1.7;
      }

      .vkn-footer a {
        color: #cdd6d4;
        text-decoration: none;
        display: block;
        font-size: 14px;
        margin-bottom: 8px;
      }

      .vkn-footer a:hover {
        color: #fff;
      }

      .vkn-footer__bottom {
        padding-top: 24px;
        font-size: 13px;
        color: #8a9794;
        display: flex;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 8px;
      }

      .vkn-footer__logo {
        font-family: "Fraunces", serif;
        color: #fff;
        font-size: 20px;
        margin-bottom: 12px;
      }

      @media (max-width: 860px) {
        .vkn-nav {
          display: none;
        }

        .vkn-burger {
          display: block;
        }

        .vkn-nav.vkn-open {
          display: flex;
          flex-direction: column;
          align-items: stretch;
          position: absolute;
          top: 100%;
          left: 0;
          right: 0;
          background: var(--vkn-bg);
          padding: 16px 24px;
          border-bottom: 1px solid var(--vkn-border);
          gap: 4px;
        }

        .vkn-hero,
        .vkn-about-grid,
        .vkn-contact-grid {
          grid-template-columns: 1fr;
          gap: 32px;
        }

        .vkn-strip,
        .vkn-treatments,
        .vkn-team,
        .vkn-stats {
          grid-template-columns: 1fr;
        }

        .vkn-footer__grid {
          grid-template-columns: 1fr;
          gap: 28px;
        }

        .vkn-cta-banner {
          padding: 36px 24px;
        }
      }
    </style>

  <body>
    <div id="vkn-root"></div>

    <script type="text/babel" data-presets="env,react">
      const {
        BrowserRouter,
        MemoryRouter,
        Switch,
        Route,
        NavLink,
        Link,
        useLocation,
        Redirect,
      } = ReactRouterDOM;
      const { useState, useEffect } = React;

      const Router = window.__KLAR_CDN ? MemoryRouter : BrowserRouter;

      // In the Klar editor the app runs on MemoryRouter (no real URL), so every
      // iframe reload (e.g. Apply HTML) resets it to "/". Persist the current
      // route to localStorage and restore it as the initial entry so a reload
      // keeps you on the page you were editing. Editor-only (window.__KLAR_CDN).
      //
      // Fixed, app-agnostic key so Klar can read it (and decide which route to
      // load) — do NOT make this app-specific. Sibling of Klar's own "klar"
      // settings key, not nested inside it. Scoped PER PROJECT so different
      // projects don't share a route; Klar builds the same key from the active
      // project id. Falls back to 475 (same default as the SDK client) when
      // window.__KLAR_PROJECT_ID__ isn't injected.
      const KLAR_ROUTE_KEY = "klar:spa-route:" + (window.__KLAR_PROJECT_ID__ || 475);
      function readStoredRoute() {
        try {
          return localStorage.getItem(KLAR_ROUTE_KEY) || "/";
        } catch (e) {
          return "/";
        }
      }
      function storeRoute(pathname) {
        try {
          localStorage.setItem(KLAR_ROUTE_KEY, pathname);
        } catch (e) {
          /* storage unavailable — ignore */
        }
      }

      // --- Klar content -------------------------------------------------------
      // Read saved :field values from pages.content via the Klar SDK. The project
      // id comes from /klar-project.js (window.__KLAR_PROJECT_ID__), which Klar
      // always writes to the repo. The SDK is imported by URL from your Klar host
      // (it derives the API base from that URL). When unavailable, every field
      // falls back to its hard-coded default.
      const KLAR_SDK_URL = "http://localhost:5173/sdk/content.js"; // ← your Klar host
      // Native dynamic import via Function so the in-browser Babel transform
      // doesn't rewrite import() into require() (which isn't defined here).
      const klarImport = new Function("u", "return import(u)");
      let klarPromise = null;
      function getKlar() {
        if (klarPromise) return klarPromise;
        const pid = window.__KLAR_PROJECT_ID__ || 475;
        if (!pid) return (klarPromise = Promise.resolve(null));
        klarPromise = klarImport(KLAR_SDK_URL)
          .then((m) => m.createKlarClient({ projectId: pid }))
          .catch((e) => {
            console.log("[klar] SDK import FAILED:", e);
            return null;
          });
        return klarPromise;
      }
      // Load one route's content ("/" -> "index.html", "/om-oss" -> "om-oss.html").
      function usePage(file) {
        const [content, setContent] = useState({});
        useEffect(() => {
          let alive = true;
          getKlar().then((klar) => {
            if (!klar) return;
            klar
              .page(file)
              .then((c) => {
                if (alive && c) setContent(c);
              })
              .catch(() => {});
          });
          return () => {
            alive = false;
          };
        }, [file]);
        return content;
      }
      // type:array (layout:list/blocks) saves [{tag, html, text}] — re-inject the
      // saved item HTML into the container; fall back to the hard-coded children.
      function Rich({ className, items, children }) {
        if (Array.isArray(items) && items.length) {
          return (
            <div
              className={className}
              dangerouslySetInnerHTML={{
                __html: items.map((i) => (i && i.html) || "").join(""),
              }}
            />
          );
        }
        return <div className={className}>{children}</div>;
      }

      const TREATMENTS = [
        {
          id: "halsoundersokning",
          title: "Hälsoundersökning",
          img: "https://images.unsplash.com/photo-1576091160550-2173dba999ef?auto=format&fit=crop&w=1600&q=80",
          alt: "Läkare som undersöker en patient",
          desc: "Grundlig genomgång av din hälsa med blodprov, EKG och personlig rådgivning.",
          price: "Från 1 290 kr",
          time: "60 min",
        },
        {
          id: "hudvard",
          title: "Medicinsk hudvård",
          img: "https://images.unsplash.com/photo-1612349317150-e413f6a5b16d?auto=format&fit=crop&w=1600&q=80",
          alt: "Hudvårdsbehandling på klinik",
          desc: "Skonsamma behandlingar mot akne, pigmentering och åldrande hud.",
          price: "Från 950 kr",
          time: "45 min",
        },
        {
          id: "fysioterapi",
