        setTodoMono9q8Tasks((todoMono9q8CurrentTasks) => [
          {
            id: todoMono9q8CreateId(),
            text: todoMono9q8TrimmedText,
            completed: false
          },
          ...todoMono9q8CurrentTasks
        ]);

        setTodoMono9q8NewText("");

        window.requestAnimationFrame(() => {
          if (todoMono9q8InputRef.current) {
            todoMono9q8InputRef.current.focus();
          }
        });
      }, [todoMono9q8NewText]);

      const todoMono9q8ToggleTask = useCallback((todoMono9q8TaskId) => {
        setTodoMono9q8Tasks((todoMono9q8CurrentTasks) => (
          todoMono9q8CurrentTasks.map((todoMono9q8Task) => (
            todoMono9q8Task.id === todoMono9q8TaskId
              ? { ...todoMono9q8Task, completed: !todoMono9q8Task.completed }
              : todoMono9q8Task
          ))
        ));
      }, []);

      const todoMono9q8RenameTask = useCallback((todoMono9q8TaskId, todoMono9q8NextText) => {
        setTodoMono9q8Tasks((todoMono9q8CurrentTasks) => (
          todoMono9q8CurrentTasks.map((todoMono9q8Task) => (
            todoMono9q8Task.id === todoMono9q8TaskId
              ? { ...todoMono9q8Task, text: todoMono9q8NextText }
              : todoMono9q8Task
          ))
        ));
      }, []);

      const todoMono9q8DeleteTask = useCallback((todoMono9q8TaskId) => {
        setTodoMono9q8ExitingIds((todoMono9q8CurrentIds) => {
          const todoMono9q8NextIds = new Set(todoMono9q8CurrentIds);
          todoMono9q8NextIds.add(todoMono9q8TaskId);
          return todoMono9q8NextIds;
        });

        window.setTimeout(() => {
          setTodoMono9q8Tasks((todoMono9q8CurrentTasks) => (
            todoMono9q8CurrentTasks.filter((todoMono9q8Task) => todoMono9q8Task.id !== todoMono9q8TaskId)
          ));

          setTodoMono9q8ExitingIds((todoMono9q8CurrentIds) => {
            const todoMono9q8NextIds = new Set(todoMono9q8CurrentIds);
            todoMono9q8NextIds.delete(todoMono9q8TaskId);
            return todoMono9q8NextIds;
          });
        }, 170);
      }, []);

      const todoMono9q8ClearCompleted = useCallback(() => {
        const todoMono9q8CompletedIds = todoMono9q8Tasks
          .filter((todoMono9q8Task) => todoMono9q8Task.completed)
          .map((todoMono9q8Task) => todoMono9q8Task.id);

        if (!todoMono9q8CompletedIds.length) return;

        setTodoMono9q8ExitingIds((todoMono9q8CurrentIds) => {
          const todoMono9q8NextIds = new Set(todoMono9q8CurrentIds);
          todoMono9q8CompletedIds.forEach((todoMono9q8TaskId) => todoMono9q8NextIds.add(todoMono9q8TaskId));
          return todoMono9q8NextIds;
        });

        window.setTimeout(() => {
          setTodoMono9q8Tasks((todoMono9q8CurrentTasks) => (
            todoMono9q8CurrentTasks.filter((todoMono9q8Task) => !todoMono9q8Task.completed)
          ));

          setTodoMono9q8ExitingIds(new Set());
        }, 170);
      }, [todoMono9q8Tasks]);

      const todoMono9q8SwitchTheme = useCallback(() => {
        const todoMono9q8NextTheme = todoMono9q8ResolvedTheme === "dark" ? "light" : "dark";
        setTodoMono9q8ThemeChoice(todoMono9q8NextTheme);

        try {
          window.localStorage.setItem(todoMono9q8StorageKeys.themeChoice, todoMono9q8NextTheme);
        } catch (todoMono9q8Error) {
          console.warn("Could not save theme choice.", todoMono9q8Error);
        }
      }, [todoMono9q8ResolvedTheme]);

      const todoMono9q8SignIn = useCallback(async () => {
        setTodoMono9q8AuthLoading(true);

        try {
          const todoMono9q8UserClient = await todoMono9q8GetKlarUserClient();
          const todoMono9q8NextUser = await todoMono9q8UserClient.signIn();
          const todoMono9q8CurrentUser = todoMono9q8NextUser || await todoMono9q8UserClient.getUser();
          setTodoMono9q8AuthUser(todoMono9q8CurrentUser || null);
        } catch (todoMono9q8Error) {
          console.warn("Could not sign in.", todoMono9q8Error);
        } finally {
          setTodoMono9q8AuthLoading(false);
        }
      }, []);

      const todoMono9q8SignOut = useCallback(async () => {
        setTodoMono9q8AuthLoading(true);

        try {
          const todoMono9q8UserClient = await todoMono9q8GetKlarUserClient();
          await todoMono9q8UserClient.signOut();
          setTodoMono9q8AuthUser(null);
        } catch (todoMono9q8Error) {
          console.warn("Could not sign out.", todoMono9q8Error);
        } finally {
          setTodoMono9q8AuthLoading(false);
        }
      }, []);

      const todoMono9q8HandleFormSubmit = useCallback((todoMono9q8Event) => {
        todoMono9q8Event.preventDefault();
        todoMono9q8AddTask();
      }, [todoMono9q8AddTask]);

      return (
        <main className="todo-mono-9q8-shell">
          <section className="todo-mono-9q8-card" aria-labelledby="todo-mono-9q8-title">
            <button
              type="button"
              className="todo-mono-9q8-theme-toggle"
              aria-label={todoMono9q8ResolvedTheme === "dark" ? "Switch to light mode" : "Switch to dark mode"}
              aria-pressed={todoMono9q8ResolvedTheme === "dark"}
              onClick={todoMono9q8SwitchTheme}
            >
              {todoMono9q8ResolvedTheme === "dark" ? <TodoMono9q8SunIcon /> : <TodoMono9q8MoonIcon />}
            </button>

            <div className="todo-mono-9q8-panel">
              <div className="todo-mono-9q8-topbar">
                <h1 id="todo-mono-9q8-title" className="todo-mono-9q8-heading">Your To Do</h1>

                <div className="todo-mono-9q8-auth-area">
                  {todoMono9q8AuthUser ? (
                    <React.Fragment>
                      <span
                        className="todo-mono-9q8-auth-name"
                        title={todoMono9q8AuthUser.email || todoMono9q8AuthName}
                      >
                        {todoMono9q8AuthName}
                      </span>
                      <button
                        type="button"
                        className="todo-mono-9q8-auth-button"
                        disabled={todoMono9q8AuthLoading}
                        onClick={todoMono9q8SignOut}
                      >
                        Sign out
                      </button>
                    </React.Fragment>
                  ) : (
                    <button
                      type="button"
                      className="todo-mono-9q8-auth-button"
                      disabled={todoMono9q8AuthLoading}
                      onClick={todoMono9q8SignIn}
                    >
                      {todoMono9q8AuthLoading ? "Checking…" : "Sign in"}
                    </button>
                  )}
                </div>
              </div>

              <form className="todo-mono-9q8-entry-form" onSubmit={todoMono9q8HandleFormSubmit}>
                <input
                  ref={todoMono9q8InputRef}
                  className="todo-mono-9q8-new-input"
                  type="text"
                  value={todoMono9q8NewText}
                  placeholder="Add new task"
                  aria-label="Add new task"
                  autoComplete="off"
                  onChange={(todoMono9q8Event) => setTodoMono9q8NewText(todoMono9q8Event.target.value)}
                />
                <button type="submit" className="todo-mono-9q8-add-button" aria-label="Add task">
                  <TodoMono9q8PlusIcon />
                </button>
              </form>

              {todoMono9q8Tasks.length > 0 ? (
                <ul className="todo-mono-9q8-list" aria-label="To-do list">
                  {todoMono9q8Tasks.map((todoMono9q8Task) => (
                    <TodoMono9q8TaskRow
                      key={todoMono9q8Task.id}
                      todoMono9q8Task={todoMono9q8Task}
                      todoMono9q8IsExiting={todoMono9q8ExitingIds.has(todoMono9q8Task.id)}
                      todoMono9q8OnToggle={todoMono9q8ToggleTask}
                      todoMono9q8OnDelete={todoMono9q8DeleteTask}
                      todoMono9q8OnRename={todoMono9q8RenameTask}
                    />
                  ))}
                </ul>
              ) : (
                <div className="todo-mono-9q8-empty-state" role="status">
                  Nothing to do 🎉<br />
                  Add your first task above.
                </div>
              )}

              <footer className="todo-mono-9q8-footer-area">
                <div className="todo-mono-9q8-summary-line">
                  <p className="todo-mono-9q8-remaining" aria-live="polite" aria-atomic="true">
                    Your remaining todos : {todoMono9q8RemainingCount}
                  </p>

                  {todoMono9q8HasCompletedTasks && (
                    <button
                      type="button"
                      className="todo-mono-9q8-clear-button"
                      onClick={todoMono9q8ClearCompleted}
                    >
                      Clear completed
                    </button>
                  )}
                </div>

                <p className="todo-mono-9q8-quote">{todoMono9q8Quote}</p>
              </footer>
            </div>
          </section>
        </main>
      );
    }

    ReactDOM.createRoot(document.getElementById("todo-mono-9q8-root")).render(<TodoMono9q8App />);
  </script>
  </body>
</html>
