<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks — A Beautiful ToDo App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet">

    <!-- React + ReactDOM UMD -->
    <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <!-- <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script> -->
    <script src="https://unpkg.com/@babel/standalone@7.29.7/babel.min.js"></script>

    <style>
      /* ── Reset & Base ───────────────────────────── */
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --klar-todo-bg-0: #0b0f1a;
        --klar-todo-bg-1: #111827;
        --klar-todo-surface: rgba(255, 255, 255, 0.045);
        --klar-todo-surface-hover: rgba(255, 255, 255, 0.08);
        --klar-todo-border: rgba(255, 255, 255, 0.09);
        --klar-todo-border-strong: rgba(255, 255, 255, 0.16);
        --klar-todo-text: #f3f4f6;
        --klar-todo-text-dim: #9ca3af;
        --klar-todo-text-mute: #6b7280;
        --klar-todo-accent: #818cf8;
        --klar-todo-accent-2: #a78bfa;
        --klar-todo-accent-glow: rgba(129, 140, 248, 0.35);
        --klar-todo-danger: #f87171;
        --klar-todo-success: #34d399;
        --klar-todo-shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
        --klar-todo-radius: 18px;
        --klar-todo-radius-sm: 12px;
      }

      html,
      body {
        height: 100%;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        color: var(--klar-todo-text);
        background: var(--klar-todo-bg-0);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
        position: relative;
        overflow-x: hidden;
      }

      /* Animated gradient background */
      body::before {
        content: '';
        position: fixed;
        inset: -50%;
        background:
          radial-gradient(circle at 20% 20%, rgba(99, 102, 241, 0.18), transparent 45%),
          radial-gradient(circle at 80% 25%, rgba(167, 139, 250, 0.14), transparent 50%),
          radial-gradient(circle at 50% 90%, rgba(52, 211, 153, 0.10), transparent 55%);
        animation: klar-todo-float-bg 22s ease-in-out infinite;
        z-index: 0;
      }

      body::after {
        content: '';
        position: fixed;
        inset: 0;
        background: radial-gradient(circle at 50% 0%, transparent, var(--klar-todo-bg-0) 80%);
        z-index: 0;
        pointer-events: none;
      }

      @keyframes klar-todo-float-bg {

        0%,
        100% {
          transform: translate(0, 0) rotate(0deg);
        }

        33% {
          transform: translate(3%, -2%) rotate(2deg);
        }

        66% {
          transform: translate(-2%, 3%) rotate(-2deg);
        }
      }

      /* ── App Container ─────────────────────────── */
      #klar-todo-root {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 560px;
      }

      .klar-todo-app {
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02));
        border: 1px solid var(--klar-todo-border);
        border-radius: var(--klar-todo-radius);
        box-shadow: var(--klar-todo-shadow);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        overflow: hidden;
      }

      /* ── Header ────────────────────────────────── */
      .klar-todo-header {
        padding: 36px 36px 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .klar-todo-header__brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .klar-todo-header__logo {
        width: 38px;
        height: 38px;
        border-radius: 11px;
        background: linear-gradient(135deg, var(--klar-todo-accent), var(--klar-todo-accent-2));
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 14px var(--klar-todo-accent-glow);
        flex-shrink: 0;
      }

      .klar-todo-header__logo svg {
        width: 20px;
        height: 20px;
        stroke: white;
        stroke-width: 2.5;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .klar-todo-header__title {
        font-size: 20px;
        font-weight: 700;
        letter-spacing: -0.03em;
      }

      .klar-todo-header__date {
        font-size: 13px;
        color: var(--klar-todo-text-dim);
        font-weight: 400;
      }

      /* ── Hero Stats ────────────────────────────── */
      .klar-todo-hero {
        padding: 28px 36px 24px;
      }

      .klar-todo-hero__greeting {
        font-size: 15px;
        color: var(--klar-todo-text-dim);
        margin-bottom: 6px;
      }

      .klar-todo-hero__big {
        font-size: 30px;
        font-weight: 800;
        letter-spacing: -0.04em;
        line-height: 1.15;
      }

      .klar-todo-hero__big span {
        background: linear-gradient(135deg, var(--klar-todo-accent), var(--klar-todo-accent-2));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .klar-todo-hero__progress {
        margin-top: 18px;
        height: 6px;
        border-radius: 99px;
        background: rgba(255, 255, 255, 0.06);
        overflow: hidden;
      }

      .klar-todo-hero__progress-bar {
        height: 100%;
        border-radius: 99px;
        background: linear-gradient(90deg, var(--klar-todo-accent), var(--klar-todo-accent-2));
        transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 0 12px var(--klar-todo-accent-glow);
      }

      /* ── Add Input ─────────────────────────────── */
      .klar-todo-add {
        padding: 0 36px 20px;
      }

      .klar-todo-add__form {
        display: flex;
        align-items: center;
        gap: 10px;
        background: var(--klar-todo-surface);
        border: 1px solid var(--klar-todo-border);
        border-radius: var(--klar-todo-radius-sm);
        padding: 6px 6px 6px 18px;
        transition: border-color 0.2s, box-shadow 0.2s;
      }

      .klar-todo-add__form:focus-within {
        border-color: var(--klar-todo-accent);
        box-shadow: 0 0 0 4px var(--klar-todo-accent-glow);
      }

      .klar-todo-add__input {
        flex: 1;
        background: none;
        border: none;
        outline: none;
        color: var(--klar-todo-text);
        font-size: 15px;
        font-family: inherit;
        padding: 12px 0;
        font-weight: 400;
      }

      .klar-todo-add__input::placeholder {
        color: var(--klar-todo-text-mute);
      }

      .klar-todo-add__btn {
        width: 40px;
        height: 40px;
        border: none;
        border-radius: 9px;
        background: linear-gradient(135deg, var(--klar-todo-accent), var(--klar-todo-accent-2));
        color: white;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
        flex-shrink: 0;
      }

      .klar-todo-add__btn:hover {
        transform: scale(1.06);
        box-shadow: 0 4px 16px var(--klar-todo-accent-glow);
      }

      .klar-todo-add__btn:active {
        transform: scale(0.96);
      }

      .klar-todo-add__btn:disabled {
        opacity: 0.35;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      .klar-todo-add__btn svg {
        width: 18px;
        height: 18px;
        stroke: white;
        stroke-width: 2.5;
        fill: none;
        stroke-linecap: round;
      }

      /* ── Filters ───────────────────────────────── */
      .klar-todo-filters {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 0 36px 16px;
      }

      .klar-todo-filters__tab {
        border: none;
        background: none;
        color: var(--klar-todo-text-dim);
        font-size: 13px;
        font-family: inherit;
        font-weight: 500;
        padding: 8px 16px;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .klar-todo-filters__tab:hover {
        color: var(--klar-todo-text);
        background: var(--klar-todo-surface-hover);
      }

      .klar-todo-filters__tab--active {
        color: var(--klar-todo-text);
        background: var(--klar-todo-surface-hover);
      }

      .klar-todo-filters__count {
        font-size: 11px;
        background: rgba(255, 255, 255, 0.1);
        padding: 1px 7px;
        border-radius: 99px;
        font-weight: 600;
        line-height: 1.5;
      }

      /* ── List ──────────────────────────────────── */
      .klar-todo-list {
        padding: 0 20px 8px;
        min-height: 80px;
        max-height: 420px;
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: var(--klar-todo-border-strong) transparent;
      }

      .klar-todo-list::-webkit-scrollbar {
        width: 6px;
      }

      .klar-todo-list::-webkit-scrollbar-track {
        background: transparent;
      }

      .klar-todo-list::-webkit-scrollbar-thumb {
        background: var(--klar-todo-border-strong);
        border-radius: 99px;
      }

      .klar-todo-item {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 14px 16px;
        margin-bottom: 6px;
        border-radius: var(--klar-todo-radius-sm);
        background: var(--klar-todo-surface);
        border: 1px solid transparent;
        transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        animation: klar-todo-item-enter 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      }

      @keyframes klar-todo-item-enter {
        from {
          opacity: 0;
          transform: translateY(-8px) scale(0.98);
        }

        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      .klar-todo-item:hover {
        background: var(--klar-todo-surface-hover);
        border-color: var(--klar-todo-border);
      }

      .klar-todo-item--done {
        opacity: 0.5;
      }

      .klar-todo-item--done .klar-todo-item__text {
        text-decoration: line-through;
        text-decoration-color: var(--klar-todo-text-mute);
        color: var(--klar-todo-text-dim);
      }

      .klar-todo-item--removing {
        animation: klar-todo-item-exit 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }

      @keyframes klar-todo-item-exit {
        to {
          opacity: 0;
          transform: translateX(24px) scale(0.95);
          height: 0;
          padding-top: 0;
          padding-bottom: 0;
          margin-bottom: 0;
        }
      }

      /* Custom Checkbox */
      .klar-todo-item__check {
        width: 24px;
        height: 24px;
        border-radius: 8px;
        border: 2px solid var(--klar-todo-border-strong);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: all 0.2s;
        position: relative;
        background: transparent;
      }

      .klar-todo-item__check:hover {
        border-color: var(--klar-todo-accent);
      }

      .klar-todo-item--done .klar-todo-item__check {
        background: linear-gradient(135deg, var(--klar-todo-accent), var(--klar-todo-accent-2));
        border-color: transparent;
      }

      .klar-todo-item__check svg {
        width: 14px;
        height: 14px;
        stroke: white;
        stroke-width: 3;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
        opacity: 0;
        transform: scale(0.4);
        transition: all 0.2s 0.05s;
      }

      .klar-todo-item--done .klar-todo-item__check svg {
        opacity: 1;
        transform: scale(1);
      }

      .klar-todo-item__text {
        flex: 1;
        font-size: 15px;
        font-weight: 400;
        line-height: 1.4;
        cursor: pointer;
        word-break: break-word;
        transition: color 0.2s;
      }

      .klar-todo-item__edit {
        flex: 1;
        background: none;
        border: none;
        outline: none;
        color: var(--klar-todo-text);
        font-size: 15px;
        font-family: inherit;
        font-weight: 400;
        padding: 4px 6px;
        border-radius: 6px;
        border: 1px solid var(--klar-todo-accent);
        box-shadow: 0 0 0 3px var(--klar-todo-accent-glow);
      }

      .klar-todo-item__actions {
        display: flex;
        gap: 4px;
        opacity: 0;
        transition: opacity 0.2s;
      }

      .klar-todo-item:hover .klar-todo-item__actions {
        opacity: 1;
      }

      .klar-todo-item__icon-btn {
        width: 30px;
        height: 30px;
        border: none;
        background: none;
        border-radius: 7px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--klar-todo-text-mute);
        transition: all 0.15s;
      }

      .klar-todo-item__icon-btn:hover {
        background: var(--klar-todo-surface-hover);
        color: var(--klar-todo-text);
      }

      .klar-todo-item__icon-btn--delete:hover {
        color: var(--klar-todo-danger);
        background: rgba(248, 113, 113, 0.1);
      }

      .klar-todo-item__icon-btn svg {
        width: 16px;
        height: 16px;
        stroke: currentColor;
        stroke-width: 2;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      /* ── Empty State ───────────────────────────── */
      .klar-todo-empty {
        text-align: center;
        padding: 48px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }

      .klar-todo-empty__icon {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        background: var(--klar-todo-surface);
        border: 1px solid var(--klar-todo-border);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 4px;
      }

      .klar-todo-empty__icon svg {
        width: 30px;
        height: 30px;
        stroke: var(--klar-todo-text-mute);
        stroke-width: 1.5;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .klar-todo-empty__title {
        font-size: 15px;
        font-weight: 600;
        color: var(--klar-todo-text-dim);
      }

      .klar-todo-empty__sub {
        font-size: 13px;
        color: var(--klar-todo-text-mute);
      }

      /* ── Footer ────────────────────────────────── */
      .klar-todo-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 36px 24px;
        border-top: 1px solid var(--klar-todo-border);
        margin-top: 4px;
      }

      .klar-todo-footer__count {
        font-size: 13px;
        color: var(--klar-todo-text-dim);
        font-weight: 400;
      }

      .klar-todo-footer__count strong {
        color: var(--klar-todo-text);
        font-weight: 700;
      }

      .klar-todo-footer__clear {
        border: none;
        background: none;
        color: var(--klar-todo-text-mute);
        font-size: 13px;
        font-family: inherit;
        font-weight: 500;
        cursor: pointer;
        padding: 6px 12px;
        border-radius: 8px;
        transition: all 0.2s;
      }

      .klar-todo-footer__clear:hover {
        color: var(--klar-todo-danger);
        background: rgba(248, 113, 113, 0.1);
      }

      .klar-todo-footer__clear:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }

      .klar-todo-footer__clear:disabled:hover {
        color: var(--klar-todo-text-mute);
        background: none;
      }

      /* ── Responsive ────────────────────────────── */
      @media (max-width: 520px) {

        .klar-todo-header,
        .klar-todo-hero,
        .klar-todo-add,
        .klar-todo-filters {
          padding-left: 20px;
          padding-right: 20px;
        }

        .klar-todo-footer {
          padding-left: 20px;
          padding-right: 20px;
        }

        .klar-todo-list {
          padding-left: 8px;
          padding-right: 8px;
        }

        .klar-todo-hero__big {
          font-size: 24px;
        }
      }
    </style>
  </head>
  <body>
    <div id="klar-todo-root"></div>

    <script type="text/babel">
      const { useState, useEffect, useRef, useCallback } = React;

// ── Icons ──────────────────────────────────────
const IconCheck = () => (
  <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
);
const IconPlus = () => (
  <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
);
const IconEdit = () => (
  <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
);
const IconTrash = () => (
  <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
);
const IconClipboard = () => (
  <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
);
const IconLogo = () => (
  <svg viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
);

// ── Storage key ────────────────────────────────
const STORAGE_KEY = 'klar-todo-app-data-v1';

// ── Greeting based on time ─────────────────────
function getGreeting() {
  const h = new Date().getHours();
  if (h < 5)  return 'Good night';
  if (h < 12) return 'Good morning';
  if (h < 17) return 'Good afternoon';
  if (h < 21) return 'Good evening';
  return 'Good night';
}

function getDateString() {
  return new Date().toLocaleDateString('en-US', {
    weekday: 'long',
    month: 'short',
    day: 'numeric'
  });
}

// ── Main App ───────────────────────────────────
function TodoApp() {
  const [todos, setTodos] = useState([]);
  const [input, setInput] = useState('');
  const [filter, setFilter] = useState('all');
  const [editingId, setEditingId] = useState(null);
  const [editText, setEditText] = useState('');
  const [removingIds, setRemovingIds] = useState(new Set());
  const editInputRef = useRef(null);
  const mainInputRef = useRef(null);

  // Load from localStorage
  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed)) setTodos(parsed);
      }
    } catch (e) { /* ignore */ }
  }, []);

  // Save to localStorage
  useEffect(() => {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
    } catch (e) { /* ignore */ }
  }, [todos]);

  // Focus edit input when editing starts
  useEffect(() => {
    if (editingId && editInputRef.current) {
      editInputRef.current.focus();
      editInputRef.current.select();
    }
  }, [editingId]);

  // Keyboard shortcut: "/" focuses main input
  useEffect(() => {
    const handler = (e) => {
      if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
        e.preventDefault();
        mainInputRef.current?.focus();
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, []);

  const addTodo = useCallback(() => {
    const text = input.trim();
    if (!text) return;
    const newTodo = {
      id: Date.now() + Math.random().toString(36).slice(2, 8),
      text,
      done: false,
      createdAt: Date.now()
    };
    setTodos(prev => [newTodo, ...prev]);
    setInput('');
  }, [input]);

  const toggleTodo = useCallback((id) => {
    setTodos(prev => prev.map(t => t.id === id ? { ...t, done: !t.done } : t));
  }, []);

  const deleteTodo = useCallback((id) => {
    // Animate removal
    setRemovingIds(prev => new Set(prev).add(id));
    setTimeout(() => {
      setTodos(prev => prev.filter(t => t.id !== id));
      setRemovingIds(prev => {
        const next = new Set(prev);
        next.delete(id);
        return next;
      });
    }, 280);
  }, []);

  const startEdit = useCallback((todo) => {
    setEditingId(todo.id);
    setEditText(todo.text);
  }, []);

  const saveEdit = useCallback(() => {
    const text = editText.trim();
    if (!text) {
      setEditingId(null);
      return;
    }
    setTodos(prev => prev.map(t => t.id === editingId ? { ...t, text } : t));
    setEditingId(null);
    setEditText('');
  }, [editingId, editText]);

  const cancelEdit = useCallback(() => {
    setEditingId(null);
    setEditText('');
  }, []);

  const clearCompleted = useCallback(() => {
    const completed = todos.filter(t => t.done);
    if (completed.length === 0) return;
    // Animate all completed
    const ids = completed.map(t => t.id);
    setRemovingIds(prev => {
      const next = new Set(prev);
      ids.forEach(id => next.add(id));
      return next;
    });
    setTimeout(() => {
      setTodos(prev => prev.filter(t => !t.done));
      setRemovingIds(new Set());
    }, 280);
  }, [todos]);

  const handleKeyDown = (e) => {
    if (e.key === 'Enter') { e.preventDefault(); addTodo(); }
    if (e.key === 'Escape') { setInput(''); }
  };

  const handleEditKeyDown = (e) => {
    if (e.key === 'Enter') { e.preventDefault(); saveEdit(); }
    if (e.key === 'Escape') { e.preventDefault(); cancelEdit(); }
  };

  // Filtered list
  const filtered = todos.filter(t => {
    if (filter === 'active')    return !t.done;
    if (filter === 'completed') return t.done;
    return true;
  });

  const total      = todos.length;
  const doneCount  = todos.filter(t => t.done).length;
  const activeCount= total - doneCount;
  const progress   = total === 0 ? 0 : Math.round((doneCount / total) * 100);

  // Determine empty state message
  let emptyTitle = 'No tasks yet';
  let emptySub   = 'Add your first task above to get started.';
  if (filter === 'active' && total > 0) {
    emptyTitle = 'All done!';
    emptySub   = 'You\'ve completed everything. Enjoy the moment.';
  } else if (filter === 'completed' && total > 0) {
    emptyTitle = 'Nothing completed yet';
    emptySub   = 'Check off a task to see it here.';
  }

  return (
    <div className="klar-todo-app">
      {/* Header */}
      <div className="klar-todo-header">
        <div className="klar-todo-header__brand">
          <div className="klar-todo-header__logo">
            <IconLogo />
          </div>
          <div className="klar-todo-header__title">Tasks</div>
        </div>
        <div className="klar-todo-header__date">{getDateString()}</div>
      </div>

      {/* Hero */}
      <div className="klar-todo-hero">
        <div className="klar-todo-hero__greeting">{getGreeting()} 👋</div>
        <div className="klar-todo-hero__big">
          {activeCount === 0 && total > 0
            ? <>You're all caught up <span>✨</span></>
            : <>You have <span>{activeCount} {activeCount === 1 ? 'task' : 'tasks'}</span> left</>}
        </div>
        <div className="klar-todo-hero__progress">
          <div
            className="klar-todo-hero__progress-bar"
            style={{ width: `${progress}%` }}
          />
        </div>
      </div>

      {/* Add */}
      <div className="klar-todo-add">
        <div className="klar-todo-add__form">
          <input
            ref={mainInputRef}
            type="text"
            className="klar-todo-add__input"
            placeholder="Add a new task…  (press / to focus)"
            value={input}
            onChange={(e) => setInput(e.target.value)}
            onKeyDown={handleKeyDown}
            maxLength={200}
          />
          <button
            className="klar-todo-add__btn"
            onClick={addTodo}
            disabled={!input.trim()}
            aria-label="Add task"
          >
            <IconPlus />
          </button>
        </div>
      </div>

      {/* Filters */}
      <div className="klar-todo-filters">
        <button
          className={`klar-todo-filters__tab ${filter === 'all' ? 'klar-todo-filters__tab--active' : ''}`}
          onClick={() => setFilter('all')}
        >
          All <span className="klar-todo-filters__count">{total}</span>
        </button>
        <button
          className={`klar-todo-filters__tab ${filter === 'active' ? 'klar-todo-filters__tab--active' : ''}`}
          onClick={() => setFilter('active')}
        >
          Active <span className="klar-todo-filters__count">{activeCount}</span>
        </button>
        <button
          className={`klar-todo-filters__tab ${filter === 'completed' ? 'klar-todo-filters__tab--active' : ''}`}
          onClick={() => setFilter('completed')}
        >
          Done <span className="klar-todo-filters__count">{doneCount}</span>
        </button>
      </div>

      {/* List */}
      <div className="klar-todo-list">
        {filtered.length === 0 ? (
          <div className="klar-todo-empty">
            <div className="klar-todo-empty__icon">
              <IconClipboard />
            </div>
            <div className="klar-todo-empty__title">{emptyTitle}</div>
            <div className="klar-todo-empty__sub">{emptySub}</div>
          </div>
        ) : (
          filtered.map(todo => {
            const isRemoving = removingIds.has(todo.id);
            const isEditing  = editingId === todo.id;
            return (
              <div
                key={todo.id}
                className={[
                  'klar-todo-item',
                  todo.done ? 'klar-todo-item--done' : '',
                  isRemoving ? 'klar-todo-item--removing' : ''
                ].filter(Boolean).join(' ')}
              >
                <div
                  className="klar-todo-item__check"
                  onClick={() => toggleTodo(todo.id)}
                  role="checkbox"
                  aria-checked={todo.done}
                  tabIndex={0}
                  onKeyDown={(e) => {
                    if (e.key === ' ' || e.key === 'Enter') {
                      e.preventDefault();
                      toggleTodo(todo.id);
                    }
                  }}
                >
                  <IconCheck />
                </div>

                {isEditing ? (
                  <input
                    ref={editInputRef}
                    className="klar-todo-item__edit"
                    value={editText}
                    onChange={(e) => setEditText(e.target.value)}
                    onKeyDown={handleEditKeyDown}
                    onBlur={saveEdit}
                    maxLength={200}
                  />
                ) : (
                  <div
                    className="klar-todo-item__text"
                    onDoubleClick={() => startEdit(todo)}
                  >
                    {todo.text}
                  </div>
                )}

                {!isEditing && (
                  <div className="klar-todo-item__actions">
                    <button
                      className="klar-todo-item__icon-btn"
                      onClick={() => startEdit(todo)}
                      aria-label="Edit task"
                    >
                      <IconEdit />
                    </button>
                    <button
                      className="klar-todo-item__icon-btn klar-todo-item__icon-btn--delete"
                      onClick={() => deleteTodo(todo.id)}
                      aria-label="Delete task"
                    >
                      <IconTrash />
                    </button>
                  </div>
                )}
              </div>
            );
          })
        )}
      </div>

      {/* Footer */}
      <div className="klar-todo-footer">
        <div className="klar-todo-footer__count">
          <strong>{activeCount}</strong> {activeCount === 1 ? 'task' : 'tasks'} remaining
        </div>
        <button
          className="klar-todo-footer__clear"
          onClick={clearCompleted}
          disabled={doneCount === 0}
        >
          Clear completed
        </button>
      </div>
    </div>
  );
}

// ── Render ─────────────────────────────────────
ReactDOM.createRoot(document.getElementById('klar-todo-root')).render(<TodoApp />);
</script>
  </body>
</html>
